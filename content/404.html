<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Downloader - 404 - Arquivo não encontrado</title>

  <!-- Roboto -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      font-family: 'Roboto', sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #f4f6f8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    h1 {
      margin: 0;
      font-size: 6rem;
      color: #e53935;
    }

    h2 {
      margin-top: 8px;
      font-weight: 300;
      color: #555;
    }

    .container {
      margin-top: 20px;
      background: #fff;
      padding: 32px;
      border-radius: 12px;
      width: 100%;
      max-width: 600px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      gap: 16px;
      text-align: center;
    }

    .message {
      color: #444;
      font-size: 1rem;
      line-height: 1.5;
    }

    .status {
      text-align: center;
      color: #777;
      font-size: 0.9rem;
    }

    button {
      padding: 12px;
      font-size: 1rem;
      border-radius: 8px;
      border: none;
      background: #4CAF50;
      color: white;
      cursor: pointer;
      font-weight: 700;
      transition: 0.2s;
    }

    button:hover {
      background: #43a047;
    }

    .icon {
      font-size: 3rem;
      margin-bottom: 8px;
    }
  </style>
</head>

<body>

  <div style="text-align:center;">
    <h1>404</h1>
    <h2>Arquivo não encontrado</h2>
  </div>

  <div class="container">
    <div class="icon">📂</div>

    <div class="message">
      O arquivo solicitado <strong>não está disponível</strong>.<br>
      Ele pode ter sido removido, expirado ou o link pode estar incorreto.
    </div>

    <div class="status">
      Arquivos no servidor expiram automaticamente após algum tempo.
    </div>

    <button onclick="window.location.href='/'">
      Voltar ao Downloader
    </button>
  </div>

</body>
</html>
